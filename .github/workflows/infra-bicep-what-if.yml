# Subscription-level Bicep what-if using OIDC (no client secret).
# Ожидается GitHub Environment **bicep**:
#   Secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID (как в «Azure — connection test»)
#   Variables (environment или repository): BICEP_PREFIX, BICEP_LOCATION; опционально BICEP_DEPLOY_AKS / BICEP_DEPLOY_ACR
#   Secret или Variable: BICEP_ALERT_EMAIL
# При запуске можно переопределить AKS/ACR полями dispatch (без смены постоянных Variables).
#
# См. infra/bicep/GITHUB_ACTIONS_VARIABLES.md (Environment + Federated credential + цепочка пайплайнов).

name: 'Infra — Bicep what-if (Azure)'

on:
  workflow_dispatch:
    inputs:
      deploy_aks:
        description: 'Параметр deployAks (use-variable = взять из BICEP_DEPLOY_AKS)'
        type: choice
        options:
          - use-variable
          - 'true'
          - 'false'
        default: use-variable
      deploy_acr:
        description: 'Параметр deployAcr (use-variable = взять из BICEP_DEPLOY_ACR)'
        type: choice
        options:
          - use-variable
          - 'true'
          - 'false'
        default: use-variable

permissions:
  id-token: write
  contents: read

env:
  ARM_TEMPLATE: infra/bicep/main.bicep

jobs:
  what-if:
    runs-on: ubuntu-latest
    environment: bicep
    steps:
      - name: Git — default branch (quieter checkout logs)
        run: |
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required configuration
        env:
          SUB: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TENANT: ${{ secrets.AZURE_TENANT_ID }}
          CLIENT: ${{ secrets.AZURE_CLIENT_ID }}
          PREFIX: ${{ vars.BICEP_PREFIX }}
          LOC: ${{ vars.BICEP_LOCATION }}
        run: |
          set -e
          for name in SUB TENANT CLIENT PREFIX LOC; do
            eval "v=\${$name}"
            if [ -z "$v" ]; then
              echo "Missing value for $name"
              echo "Azure: Repository или Environment **Secrets** AZURE_SUBSCRIPTION_ID, AZURE_TENANT_ID, AZURE_CLIENT_ID"
              echo "Bicep: **Variables** BICEP_PREFIX, BICEP_LOCATION (см. «Azure — connection test» Preflight и GITHUB_ACTIONS_VARIABLES.md)"
              exit 1
            fi
          done
          echo "Required secrets/vars present."

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep build
        run: az bicep build --file "$ARM_TEMPLATE"

      - name: Deployment what-if
        env:
          INPUT_DEPLOY_AKS: ${{ inputs.deploy_aks }}
          INPUT_DEPLOY_ACR: ${{ inputs.deploy_acr }}
          DEPLOY_AKS: ${{ vars.BICEP_DEPLOY_AKS }}
          DEPLOY_ACR: ${{ vars.BICEP_DEPLOY_ACR }}
          ALERT_SECRET: ${{ secrets.BICEP_ALERT_EMAIL }}
          ALERT_VAR: ${{ vars.BICEP_ALERT_EMAIL }}
        run: |
          set -euo pipefail
          ALERT="${ALERT_SECRET:-}"
          if [ -z "$ALERT" ]; then ALERT="${ALERT_VAR:-}"; fi
          if [ -z "$ALERT" ]; then
            echo "Set BICEP_ALERT_EMAIL as Environment or repository Variable or Secret."
            exit 1
          fi
          if [ "${INPUT_DEPLOY_AKS}" = "use-variable" ]; then
            AKS="${DEPLOY_AKS:-false}"
          else
            AKS="${INPUT_DEPLOY_AKS}"
          fi
          if [ "${INPUT_DEPLOY_ACR}" = "use-variable" ]; then
            ACR="${DEPLOY_ACR:-false}"
          else
            ACR="${INPUT_DEPLOY_ACR}"
          fi
          echo "what-if deployAks=$AKS deployAcr=$ACR (dispatch overrides use-variable → vars)"
          NAME="gh-whatif-${{ github.run_id }}-${{ github.run_attempt }}"
          az deployment sub what-if \
            --location "${{ vars.BICEP_LOCATION }}" \
            --name "$NAME" \
            --template-file "$ARM_TEMPLATE" \
            --no-pretty-print \
            --parameters \
              prefix="${{ vars.BICEP_PREFIX }}" \
              location="${{ vars.BICEP_LOCATION }}" \
              alertEmail="$ALERT" \
              deployAks="$AKS" \
              deployAcr="$ACR"
