# Skeleton: reusable build and push to ACR.
# Invoked via workflow_call from microservice-path-skeleton.yml (or your own workflow with jobs.uses).
#
# GitHub has NO "Run workflow" for files with only on: workflow_call —
# open the calling workflow (e.g. Microservice — service-a path skeleton) and run that.
#
# Before use: configure federated credential + secrets in Environment (or repo),
# as in Infra — Bicep what-if (AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID).
# Also: ACR_LOGIN_SERVER (e.g. myregistry.azurecr.io), optionally ACR_NAME for `az acr build`.

name: 'Reusable — build & push (skeleton)'

on:
  workflow_call:
    inputs:
      image_repository:
        description: 'ACR repository name without registry host (e.g. omniscope/service-a)'
        required: true
        type: string
      docker_context:
        description: 'Dockerfile directory (from repo root)'
        required: true
        type: string
      image_tag:
        description: 'Image tag (e.g. git SHA or run id)'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    environment: acr-build
    steps:
      - uses: actions/checkout@v4

      - name: Azure — login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${{ vars.ACR_NAME }}"

      # Option A: build on runner
      - name: Docker build & push (skeleton — uncomment when Dockerfile exists)
        run: |
          echo "::notice::Skeleton: set ACR_LOGIN_SERVER / path to Dockerfile"
          echo "Would build: ${{ inputs.docker_context }}"
          echo "Image: ${{ vars.ACR_LOGIN_SERVER }}/${{ inputs.image_repository }}:${{ inputs.image_tag }}"
          # docker build -t "$REG/${{ inputs.image_repository }}:${{ inputs.image_tag }}" "${{ inputs.docker_context }}"
          # docker push "$REG/${{ inputs.image_repository }}:${{ inputs.image_tag }}"

      # Option B (preferred in Azure): az acr build --registry ... --image repo:tag .
