name: 'Load test — k6'

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target URL for service-a (e.g. https://example/ or http://host:8081)'
        required: true
        default: 'http://localhost:8081'
      compare_baseline:
        description: 'Fail workflow if p95 regresses beyond allowed percentage'
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'true'
  schedule:
    - cron: '30 3 * * *'

permissions:
  contents: read

jobs:
  k6:
    runs-on: ubuntu-latest
    env:
      RUN_ID: gh-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Для workflow_dispatch брать BASE_URL/compare из dispatch; для schedule — только Variables.
      - name: Установить BASE_URL и COMPARE_BASELINE (dispatch vs cron)
        run: |
          set -euo pipefail
          ALLOW="${ALLOW_REGRESSION_PERCENT:-}"
          if [ -z "$ALLOW" ]; then
            ALLOW="10"
          fi
          echo "ALLOW_REGRESSION_PERCENT=${ALLOW}" >> "$GITHUB_ENV"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "BASE_URL=${{ inputs.base_url }}" >> "$GITHUB_ENV"
            echo "COMPARE_BASELINE=${{ inputs.compare_baseline }}" >> "$GITHUB_ENV"
          else
            echo "BASE_URL=${{ vars.LOAD_TEST_BASE_URL }}" >> "$GITHUB_ENV"
            echo "COMPARE_BASELINE=true" >> "$GITHUB_ENV"
          fi

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6 jq

      - name: Validate BASE_URL
        run: |
          set -euo pipefail
          if [ -z "${BASE_URL:-}" ]; then
            echo "Set input.base_url or repository variable LOAD_TEST_BASE_URL"
            exit 1
          fi
          echo "Load test target: $BASE_URL"

      - name: Run k6 load test
        run: |
          set -euo pipefail
          BASE_URL="$BASE_URL" \
          COMPARE_BASELINE="$COMPARE_BASELINE" \
          ALLOW_REGRESSION_PERCENT="$ALLOW_REGRESSION_PERCENT" \
          RUN_ID="$RUN_ID" \
          ./scripts/run-load-test.sh

      - name: Upload load-test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            tests/load/results/*.json
            tests/load/baseline.json
