# Skeleton per-microservice pipeline: path triggers + reusable build/push.
# Copy this file per service and adjust paths / image_repository.

name: 'Microservice — service-a (path skeleton)'

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'examples/kubernetes/apps/service-a.yaml'
      # - 'examples/services/service-a/**'
  pull_request:
    paths:
      - 'examples/kubernetes/apps/service-a.yaml'

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    uses: ./.github/workflows/reusable-build-push-skeleton.yml
    with:
      image_repository: omniscope/service-a
      docker_context: examples/kubernetes/apps
      image_tag: ${{ github.sha }}
    secrets: inherit

  # deploy in a separate job on merge to main (or another workflow with needs: build-push)
  # deploy:
  #   needs: [build-push]
  #   uses: ./.github/workflows/... # or steps with kubectl
