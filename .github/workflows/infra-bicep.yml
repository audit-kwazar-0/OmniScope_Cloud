# Validate Bicep on every change (no Azure credentials required).

name: Infra — Bicep validate

on:
  push:
    branches: [main, master]
    paths:
      - 'infra/bicep/**'
      - '.github/workflows/infra-bicep.yml'
  pull_request:
    paths:
      - 'infra/bicep/**'
      - '.github/workflows/infra-bicep.yml'
  workflow_dispatch:

jobs:
  bicep-build:
    runs-on: ubuntu-latest
    steps:
      - name: Git — default branch (quieter checkout logs)
        run: |
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Bicep CLI
        run: az bicep version 2>/dev/null || az bicep install

      - name: Bicep build
        run: az bicep build --file infra/bicep/main.bicep
