# Build VitePress site under doc-site/ and publish to GitHub Pages.
# Repository Settings → Pages → Build and deployment → Source: GitHub Actions

name: Deploy documentation to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'doc-site/**'
      - 'README.md'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: doc-site/package-lock.json

      - name: Install dependencies
        working-directory: doc-site
        run: npm ci

      - name: Build VitePress
        working-directory: doc-site
        env:
          # Project Pages: https://<owner>.github.io/<repo>/
          # User site (repo named <user>.github.io): use VITEPRESS_BASE: /
          # Custom domain at site root: use VITEPRESS_BASE: /
          VITEPRESS_BASE: /${{ github.event.repository.name }}/
          DOCS_PUBLIC_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: doc-site/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
