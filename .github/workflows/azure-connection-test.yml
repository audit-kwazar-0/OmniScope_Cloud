# Минимальная проверка: GitHub Actions → Azure (OIDC).
# Ожидается GitHub Environment **bicep** с Secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID.
# В Entra для этого же приложения нужен federated credential с типом **Environment** и именем **bicep**
# (не только Branch — см. infra/bicep/GITHUB_ACTIONS_VARIABLES.md).
#
# Запуск: Actions → "Azure — connection test" → Run workflow.

name: 'Azure — connection test'

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  verify-azure-login:
    runs-on: ubuntu-latest
    environment: bicep
    steps:
      - name: Git — default branch (consistent runner config)
        run: |
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Проверка Secrets (Environment bicep)
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -euo pipefail
          missing=""
          [ -z "${AZURE_SUBSCRIPTION_ID:-}" ] && missing="$missing AZURE_SUBSCRIPTION_ID"
          [ -z "${AZURE_TENANT_ID:-}" ] && missing="$missing AZURE_TENANT_ID"
          [ -z "${AZURE_CLIENT_ID:-}" ] && missing="$missing AZURE_CLIENT_ID"
          if [ -n "$missing" ]; then
            echo "::error::В контексте job не найдены Secrets:$missing"
            echo ""
            echo "Задайте их в Settings → Environments → bicep → Environment secrets **или** в Repository secrets (имена те же)."
            echo "Имена строго: AZURE_SUBSCRIPTION_ID, AZURE_TENANT_ID, AZURE_CLIENT_ID"
            echo ""
            echo "Альтернатива без Environment: уберите «environment: bicep» из workflow и храните AZURE_* как Repository Secrets (не Variables — для OIDC нужны secrets)."
            echo "Док: infra/bicep/GITHUB_ACTIONS_VARIABLES.md"
            exit 1
          fi
          echo "Три Azure OIDC Secrets на месте (Environment и/или Repository)."

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Подписка активна
        run: |
          echo "=== az account show ==="
          az account show --output table
          echo "=== OK: GitHub достиг Azure ==="

      - name: Preflight — переменные для «Infra — Bicep what-if»
        env:
          BICEP_PREFIX: ${{ vars.BICEP_PREFIX }}
          BICEP_LOCATION: ${{ vars.BICEP_LOCATION }}
          BICEP_ALERT_EMAIL: ${{ vars.BICEP_ALERT_EMAIL }}
          BICEP_ALERT_HAS_SECRET: ${{ secrets.BICEP_ALERT_EMAIL != '' }}
          BICEP_DEPLOY_AKS: ${{ vars.BICEP_DEPLOY_AKS }}
          BICEP_DEPLOY_ACR: ${{ vars.BICEP_DEPLOY_ACR }}
        run: |
          set -euo pipefail
          echo "=== Preflight для workflow «Infra — Bicep what-if (Azure)» ==="
          echo "(Этот шаг не валит job — только подсказки.)"
          ok=1
          if [ -z "${BICEP_PREFIX:-}" ]; then echo "::warning::Не задана Variable BICEP_PREFIX — what-if упадёт на проверке конфигурации."; ok=0; fi
          if [ -z "${BICEP_LOCATION:-}" ]; then echo "::warning::Не задана Variable BICEP_LOCATION — what-if упадёт."; ok=0; fi
          if [ -z "${BICEP_ALERT_EMAIL:-}" ] && [ "${BICEP_ALERT_HAS_SECRET:-false}" != "true" ]; then
            echo "::warning::Нет ни vars.BICEP_ALERT_EMAIL, ни secrets.BICEP_ALERT_EMAIL — what-if упадёт."
            ok=0
          fi
          echo "BICEP_DEPLOY_AKS (vars) = ${BICEP_DEPLOY_AKS:-<пусто> → в what-if будет false}"
          echo "BICEP_DEPLOY_ACR (vars) = ${BICEP_DEPLOY_ACR:-<пусто> → в what-if будет false}"
          if [ "${BICEP_DEPLOY_AKS:-}" != "true" ]; then
            echo "::notice::Для плана с AKS задайте Variable BICEP_DEPLOY_AKS=true (и обычно BICEP_DEPLOY_ACR=true) или в what-if выберите режим «true» в dispatch-полях."
          fi
          if [ "$ok" = 1 ]; then echo "Минимальный набор BICEP_* для запуска what-if выглядит заданным."; fi
