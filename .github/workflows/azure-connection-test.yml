# Minimal check: GitHub Actions → Azure (OIDC).
# Expects GitHub Environment **bicep** with Secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID.
# In Entra the same app needs a federated credential of type **Environment** named **bicep**
# (not Branch only — see infra/bicep/GITHUB_ACTIONS_VARIABLES.md).
#
# Run: Actions → "Azure — connection test" → Run workflow.

name: 'Azure — connection test'

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  verify-azure-login:
    runs-on: ubuntu-latest
    environment: bicep
    steps:
      - name: Git — default branch (consistent runner config)
        run: |
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check Secrets (Environment bicep)
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -euo pipefail
          missing=""
          [ -z "${AZURE_SUBSCRIPTION_ID:-}" ] && missing="$missing AZURE_SUBSCRIPTION_ID"
          [ -z "${AZURE_TENANT_ID:-}" ] && missing="$missing AZURE_TENANT_ID"
          [ -z "${AZURE_CLIENT_ID:-}" ] && missing="$missing AZURE_CLIENT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Secrets not found in job context:$missing"
            echo ""
            echo "Set them under Settings → Environments → bicep → Environment secrets **or** Repository secrets (same names)."
            echo "Names must be exactly: AZURE_SUBSCRIPTION_ID, AZURE_TENANT_ID, AZURE_CLIENT_ID"
            echo ""
            echo "Alternative without Environment: remove environment: bicep from the workflow and store AZURE_* as Repository Secrets (not Variables — OIDC needs secrets)."
            echo "Doc: infra/bicep/GITHUB_ACTIONS_VARIABLES.md"
            exit 1
          fi
          echo "All three Azure OIDC secrets present (Environment and/or Repository)."

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Subscription active
        run: |
          echo "=== az account show ==="
          az account show --output table
          echo "=== OK: GitHub reached Azure ==="

      - name: Preflight — variables for "Infra — Bicep what-if"
        env:
          BICEP_PREFIX: ${{ vars.BICEP_PREFIX }}
          BICEP_LOCATION: ${{ vars.BICEP_LOCATION }}
          BICEP_ALERT_EMAIL: ${{ vars.BICEP_ALERT_EMAIL }}
          BICEP_ALERT_HAS_SECRET: ${{ secrets.BICEP_ALERT_EMAIL != '' }}
          BICEP_DEPLOY_AKS: ${{ vars.BICEP_DEPLOY_AKS }}
          BICEP_DEPLOY_ACR: ${{ vars.BICEP_DEPLOY_ACR }}
        run: |
          set -euo pipefail
          echo "=== Preflight for workflow \"Infra — Bicep what-if (Azure)\" ==="
          echo "(This step does not fail the job — hints only.)"
          ok=1
          if [ -z "${BICEP_PREFIX:-}" ]; then echo "::warning::Variable BICEP_PREFIX not set — what-if will fail configuration check."; ok=0; fi
          if [ -z "${BICEP_LOCATION:-}" ]; then echo "::warning::Variable BICEP_LOCATION not set — what-if will fail."; ok=0; fi
          if [ -z "${BICEP_ALERT_EMAIL:-}" ] && [ "${BICEP_ALERT_HAS_SECRET:-false}" != "true" ]; then
            echo "::warning::Neither vars.BICEP_ALERT_EMAIL nor secrets.BICEP_ALERT_EMAIL — what-if will fail."
            ok=0
          fi
          echo "BICEP_DEPLOY_AKS (vars) = ${BICEP_DEPLOY_AKS:-<empty> → false in what-if}"
          echo "BICEP_DEPLOY_ACR (vars) = ${BICEP_DEPLOY_ACR:-<empty> → false in what-if}"
          if [ "${BICEP_DEPLOY_AKS:-}" != "true" ]; then
            echo "::notice::For a plan with AKS set Variable BICEP_DEPLOY_AKS=true (and usually BICEP_DEPLOY_ACR=true) or pick true in what-if dispatch fields."
          fi
          if [ "$ok" = 1 ]; then echo "Minimal BICEP_* set for what-if looks configured."; fi
