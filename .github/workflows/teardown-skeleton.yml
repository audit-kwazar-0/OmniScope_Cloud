# Skeleton: manual teardown only (dev / review env). Protect Environment with GitHub approvals.
# Order: drain Kubernetes load first, then infra (or the reverse — per your data policy).

name: 'Teardown — skeleton (manual)'

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'What to delete'
        type: choice
        options:
          - k8s-namespace-only
          - full-rg-with-approval
        default: k8s-namespace-only
      namespace:
        description: 'Kubernetes namespace (for k8s-namespace-only)'
        type: string
        default: omniscope

permissions:
  id-token: write
  contents: read

jobs:
  delete-k8s:
    if: ${{ inputs.target == 'k8s-namespace-only' }}
    runs-on: ubuntu-latest
    environment: aks-deploy
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: kubeconfig + delete namespace (skeleton)
        run: |
          echo "::warning::Namespace delete ${{ inputs.namespace }} — uncomment after kubectl is configured"
          # az aks get-credentials ...
          # kubectl delete namespace ${{ inputs.namespace }} --wait=true

  destroy-infra:
    if: ${{ inputs.target == 'full-rg-with-approval' }}
    runs-on: ubuntu-latest
    environment: production-teardown
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Destroy (skeleton)
        run: |
          echo "::warning::pulumi destroy / RG delete — only after explicit Environment approval"
          echo "RG: ${{ vars.TARGET_RESOURCE_GROUP }}"
