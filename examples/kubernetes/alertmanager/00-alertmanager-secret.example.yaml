apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: omniscope
type: Opaque
stringData:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'your-sender@gmail.com'
      smtp_auth_username: 'your-sender@gmail.com'
      smtp_auth_password: 'replace-with-gmail-app-password'
      smtp_require_tls: true

    route:
      receiver: omniscope-email
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 2h

    receivers:
      - name: omniscope-email
        email_configs:
          - to: 'tempb59@gmail.com'
            send_resolved: true
