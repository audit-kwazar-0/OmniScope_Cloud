apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope
  namespace: omniscope
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyroscope
  template:
    metadata:
      labels:
        app: pyroscope
    spec:
      containers:
        - name: pyroscope
          image: grafana/pyroscope:1.12.0
          args:
            - "server"
          ports:
            - name: http
              containerPort: 4040
---
apiVersion: v1
kind: Service
metadata:
  name: pyroscope
  namespace: omniscope
spec:
  type: LoadBalancer
  selector:
    app: pyroscope
  ports:
    - name: http
      port: 4040
      targetPort: 4040
