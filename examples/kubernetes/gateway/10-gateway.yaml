apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: omniscope-gateway
  namespace: omniscope
spec:
  # Replace with your controller class name, for example:
  # - AKS ALB controller: azure-alb-external
  # - NGINX Gateway Fabric: nginx
  # - Istio: istio
  gatewayClassName: __GATEWAY_CLASS__
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
